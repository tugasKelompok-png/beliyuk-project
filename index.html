<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>BeliYuk – Form Pemesanan</title>
</head>

<body>

<!-- HEADER -->
<table width="100%">
<tr>
<td align="center">
<h1>🛒 BeliYuk</h1>
<h3>Form Pemesanan Produk Online</h3>
</td>
</tr>
</table>

<br>

<div align="center">
<table width="60%" cellpadding="15">
<tr>
<td>

<form action="#" method="post">

<!-- DATA PEMESAN -->
<fieldset>
<legend><b>👤 Data Pemesan</b></legend>

<table width="100%">
<tr>
<td><label for="nama">Nama</label></td>
<td><label>Jenis Kelamin</label></td>
</tr>
<tr>
<td><input id="nama" type="text" name="nama" size="30" placeholder="Nama lengkap" required></td>
<td>
<input type="radio" name="jk" value="Laki-laki" required> Laki-laki
<input type="radio" name="jk" value="Perempuan"> Perempuan
</td>
</tr>

<tr>
<td><label for="no_wa">No WA</label></td>
<td><label for="tgl_lahir">Tanggal Lahir</label></td>
</tr>
<tr>
<td>
<input id="no_wa" type="tel" name="no_wa" size="30"
placeholder="08xxxxxxxxxx"
pattern="[0-9]{10,13}"
title="Masukkan 10-13 digit angka"
required>
</td>
<td><input id="tgl_lahir" type="date" name="tgl_lahir" required></td>
</tr>

<tr>
<td><label for="email">Email</label></td>
<td><label for="alamat">Alamat</label></td>
</tr>
<tr>
<td><input id="email" type="email" name="email" size="30" placeholder="email@gmail.com" required></td>
<td><textarea id="alamat" name="alamat" rows="2" cols="25" placeholder="Alamat lengkap" required></textarea></td>
</tr>

</table>
</fieldset>

<br>

<!-- DETAIL PRODUK -->
<fieldset>
<legend><b>📦 Detail Produk</b></legend>

<table width="100%">
<tr>
<td><label for="nama_produk">Nama Produk</label></td>
<td><label for="kategori">Kategori</label></td>
</tr>
<tr>
<td><input id="nama_produk" type="text" name="nama_produk" size="30" placeholder="Nama produk" required></td>
<td>
<select id="kategori" name="kategori" required>
<option value="">-- Pilih Kategori --</option>
<option value="elektronik">Elektronik</option>
<option value="pakaian">Pakaian</option>
<option value="makanan">Makanan</option>
</select>
</td>
</tr>

<tr>
<td><label for="jumlah">Jumlah</label></td>
<td><label for="warna">Warna</label></td>
</tr>
<tr>
<td><input id="jumlah" type="number" name="jumlah" min="1" placeholder="Jumlah" required></td>
<td><input id="warna" type="text" name="warna" placeholder="Contoh: Hitam" required></td>
</tr>

<tr>
<td><label for="ukuran">Ukuran</label></td>
<td><label for="merek">Merek</label></td>
</tr>
<tr>
<td>
<select id="ukuran" name="ukuran" required>
<option value="">-- Pilih Ukuran --</option>
<option value="none">Tidak ada ukuran</option>
<option value="S">S</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
</select>
</td>
<td><input id="merek" type="text" name="merek" placeholder="Nama brand" required></td>
</tr>

<tr>
<td><label for="catatan">Catatan</label></td>
<td></td>
</tr>
<tr>
<td colspan="2"><textarea id="catatan" name="catatan" rows="3" cols="60" placeholder="Catatan tambahan"></textarea></td>
</tr>

</table>
</fieldset>

<br>

<!-- PENGIRIMAN -->
<fieldset>
<legend><b>🚚 Pengiriman</b></legend>

<table width="100%">
<tr>
<td><label>Metode</label></td>
<td><label for="jasa_kirim">Jasa Kirim</label></td>
</tr>
<tr>
<td>
<input type="radio" name="metode" value="kirim" required> Kirim
<input type="radio" name="metode" value="ambil"> Ambil
</td>
<td>
<select id="jasa_kirim" name="jasa_kirim" required>
<option value="">-- Pilih Jasa --</option>
<option value="jne">JNE</option>
<option value="jnt">J&T</option>
<option value="sicepat">SiCepat</option>
</select>
</td>
</tr>

<tr>
<td><label for="penerima">Nama Penerima</label></td>
<td><label for="no_hp">No HP</label></td>
</tr>
<tr>
<td><input id="penerima" type="text" name="penerima" placeholder="Nama penerima" required></td>
<td>
<input id="no_hp" type="tel" name="no_hp"
placeholder="08xxxxxxxxxx"
pattern="[0-9]{10,13}"
title="Masukkan 10-13 digit angka"
required>
</td>
</tr>

<tr>
<td><label for="alamat_kirim">Alamat</label></td>
<td><label for="kota">Kota</label></td>
</tr>
<tr>
<td><textarea id="alamat_kirim" name="alamat_kirim" placeholder="Alamat lengkap" required></textarea></td>
<td><input id="kota" type="text" name="kota" placeholder="Nama kota" required></td>
</tr>

<tr>
<td><label for="kode_pos">Kode Pos</label></td>
<td></td>
</tr>
<tr>
<td>
<input id="kode_pos" type="text" name="kode_pos"
pattern="[0-9]{5}"
placeholder="12345"
title="Harus 5 digit angka"
required>
</td>
<td></td>
</tr>

</table>
</fieldset>

<br>

<!-- PEMBAYARAN -->
<fieldset>
<legend><b>💳 Pembayaran</b></legend>

<table width="100%">
<tr>
<td><label for="metode_bayar">Metode</label></td>
<td><label for="bank">Bank</label></td>
</tr>
<tr>
<td>
<select id="metode_bayar" name="metode_bayar" required>
<option value="">-- Pilih --</option>
<option value="transfer">Transfer Bank</option>
<option value="dana">DANA</option>
<option value="gopay">GoPay</option>
<option value="qris">QRIS</option>
<option value="cod">COD</option>
</select>
</td>
<td>
<select id="bank" name="bank" required>
<option value="">-- Pilih Bank --</option>
<option value="bca">BCA</option>
<option value="bri">BRI</option>
<option value="bni">BNI</option>
<option value="mandiri">Mandiri</option>
</select>
</td>
</tr>

<tr>
<td><label for="nomor">Nomor</label></td>
<td><label for="nama_rekening">Nama Pemilik</label></td>
</tr>
<tr>
<td>
<input id="nomor" type="text" name="nomor"
pattern="[0-9]{8,16}"
placeholder="No rekening / e-wallet"
title="Masukkan 8-16 digit angka"
required>
</td>
<td><input id="nama_rekening" type="text" name="nama_rekening" placeholder="Nama pemilik" required></td>
</tr>

<tr>
<td><label for="bukti">Upload Bukti</label></td>
<td><label for="promo">Kode Promo</label></td>
</tr>
<tr>
<td><input id="bukti" type="file" name="bukti" required></td>
<td><input id="promo" type="text" name="promo" placeholder="Kode promo"></td>
</tr>

</table>
</fieldset>

<br>

<!-- KONFIRMASI -->
<fieldset>
<legend><b>✅ Konfirmasi</b></legend>

<table width="100%">

<tr>
<td colspan="2">
<input type="checkbox" name="setuju" required> Setuju syarat<br>
<input type="checkbox" name="valid" required> Data benar<br>
<input type="checkbox" name="promo"> Terima promo
</td>
</tr>

<tr>
<td><b>Waktu</b></td>
<td><b>Pesan</b></td>
</tr>

<tr>
<td>
<input type="radio" name="waktu" value="pagi" required> Pagi<br>
<input type="radio" name="waktu" value="siang"> Siang<br>
<input type="radio" name="waktu" value="malam"> Malam
</td>

<td>
<textarea name="pesan" placeholder="Tulis pesan tambahan"></textarea>
</td>
</tr>

</table>

</fieldset>

<br>

<div align="center">
<input type="reset" value="🔄 Reset">
<input type="submit" value="🛍️ Pesan Sekarang">
</div>

</form>

</td>
</tr>
</table>
</div>

<br>

<!-- FOOTER -->
<table width="100%">
<tr>
<td align="center">
© 2026 BeliYuk
</td>
</tr>
</table>

</body>
</html>
