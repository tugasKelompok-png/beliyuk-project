<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>BeliYuk – Form Pemesanan</title>
</head>

<body bgcolor="#f0f8ff">

<!-- HEADER -->
<table width="100%" bgcolor="#ffa500">
<tr>
<td align="center">
<h1><font color="white">🛒 BeliYuk</font></h1>
<h3><font color="white">Form Pemesanan Produk Online</font></h3>
</td>
</tr>
</table>

<br>

<center>
<table width="60%" bgcolor="white" cellpadding="15">
<tr>
<td>

<form action="#" method="post">

<!-- DATA PEMESAN -->
<fieldset>
<legend><b><font color="orange">👤 Data Pemesan</font></b></legend>

<table width="100%">
<tr>
<td><label>Nama</label></td>
<td><label>Jenis Kelamin</label></td>
</tr>
<tr>
<td><input type="text" name="nama" size="30" placeholder="Nama lengkap" required></td>
<td>
<input type="radio" name="jk" value="Laki-laki" required> Laki-laki
<input type="radio" name="jk" value="Perempuan"> Perempuan
</td>
</tr>

<tr>
<td><label>No WA</label></td>
<td><label>Tanggal Lahir</label></td>
</tr>
<tr>
<td>
<input type="tel" name="no_wa" size="30" placeholder="08xxxxxxxxxx" pattern="[0-9]{10,13}" required>
</td>
<td><input type="date" name="tgl_lahir" required></td>
</tr>

<tr>
<td><label>Email</label></td>
<td><label>Alamat</label></td>
</tr>
<tr>
<td><input type="email" name="email" size="30" placeholder="email@gmail.com" required></td>
<td><textarea name="alamat" rows="2" cols="25" placeholder="Alamat lengkap" required></textarea></td>
</tr>

</table>
</fieldset>

<br>

<!-- DETAIL PRODUK -->
<fieldset>
<legend><b><font color="orange">📦 Detail Produk</font></b></legend>

<table width="100%">
<tr>
<td><label>Nama Produk</label></td>
<td><label>Kategori</label></td>
</tr>
<tr>
<td><input type="text" name="nama_produk" size="30" required></td>
<td>
<select name="kategori" required>
<option value="">-- Pilih Kategori --</option>
<option value="elektronik">Elektronik</option>
<option value="pakaian">Pakaian</option>
<option value="makanan">Makanan</option>
</select>
</td>
</tr>

<tr>
<td><label>Jumlah</label></td>
<td><label>Warna</label></td>
</tr>
<tr>
<td><input type="number" name="jumlah" min="1" required></td>
<td><input type="text" name="warna" required></td>
</tr>

<tr>
<td><label>Ukuran</label></td>
<td><label>Merek</label></td>
</tr>
<tr>
<td>
<select name="ukuran" required>
<option value="">-- Pilih Ukuran --</option>
<option value="none">Tidak ada ukuran</option>
<option value="S">S</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
</select>
</td>
<td><input type="text" name="merek" required></td>
</tr>

<tr>
<td><label>Catatan</label></td>
<td></td>
</tr>
<tr>
<td colspan="2"><textarea name="catatan" rows="3" cols="60"></textarea></td>
</tr>

</table>
</fieldset>

<br>

<!-- PENGIRIMAN -->
<fieldset>
<legend><b><font color="orange">🚚 Pengiriman</font></b></legend>

<table width="100%">
<tr>
<td><label>Metode</label></td>
<td><label>Jasa Kirim</label></td>
</tr>
<tr>
<td>
<input type="radio" name="metode" value="kirim" required> Kirim
<input type="radio" name="metode" value="ambil"> Ambil
</td>
<td>
<select name="jasa_kirim" required>
<option value="">-- Pilih Jasa --</option>
<option value="jne">JNE</option>
<option value="jnt">J&T</option>
<option value="sicepat">SiCepat</option>
</select>
</td>
</tr>

<tr>
<td><label>Nama Penerima</label></td>
<td><label>No HP</label></td>
</tr>
<tr>
<td><input type="text" name="penerima" required></td>
<td><input type="tel" name="no_hp" pattern="[0-9]{10,13}" required></td>
</tr>

<tr>
<td><label>Alamat</label></td>
<td><label>Kota</label></td>
</tr>
<tr>
<td><textarea name="alamat_kirim" required></textarea></td>
<td><input type="text" name="kota" required></td>
</tr>

<tr>
<td><label>Kode Pos</label></td>
<td></td>
</tr>
<tr>
<td><input type="text" name="kode_pos" pattern="[0-9]{5}" required></td>
<td></td>
</tr>

</table>
</fieldset>

<br>

<!-- PEMBAYARAN -->
<fieldset>
<legend><b><font color="orange">💳 Pembayaran</font></b></legend>

<table width="100%">
<tr>
<td><label>Metode</label></td>
<td><label>Bank</label></td>
</tr>
<tr>
<td>
<select name="metode_bayar" required>
<option value="">-- Pilih --</option>
<option value="transfer">Transfer Bank</option>
<option value="dana">DANA</option>
<option value="gopay">GoPay</option>
<option value="qris">QRIS</option>
<option value="cod">COD</option>
</select>
</td>
<td>
<select name="bank" required>
<option value="">-- Pilih Bank --</option>
<option value="bca">BCA</option>
<option value="bri">BRI</option>
<option value="bni">BNI</option>
<option value="mandiri">Mandiri</option>
</select>
</td>
</tr>

<tr>
<td><label>Nomor</label></td>
<td><label>Nama Pemilik</label></td>
</tr>
<tr>
<td><input type="text" name="nomor" pattern="[0-9]{8,16}" required></td>
<td><input type="text" name="nama_rekening" required></td>
</tr>

<tr>
<td><label>Upload Bukti</label></td>
<td><label>Kode Promo</label></td>
</tr>
<tr>
<td><input type="file" name="bukti"></td>
<td><input type="text" name="promo"></td>
</tr>

</table>
</fieldset>

<br>

<!-- KONFIRMASI -->
<fieldset>
<legend><b><font color="orange">✅ Konfirmasi</font></b></legend>

<table width="100%">

<tr>
<td colspan="2">
<input type="checkbox" name="setuju" required> Setuju syarat<br>
<input type="checkbox" name="valid" required> Data benar<br>
<input type="checkbox" name="promo"> Terima promo
</td>
</tr>

<tr>
<td><b>Waktu</b></td>
<td><b>Pesan</b></td>
</tr>

<tr>
<td>
<input type="radio" name="waktu" value="pagi" required> Pagi<br>
<input type="radio" name="waktu" value="siang"> Siang<br>
<input type="radio" name="waktu" value="malam"> Malam
</td>

<td>
<textarea name="pesan"></textarea>
</td>
</tr>

</table>

</fieldset>

<br>

<center>
<input type="reset" value="🔄 Reset">
<input type="submit" value="🛍️ Pesan Sekarang">
</center>

</form>

</td>
</tr>
</table>
</center>

<br>

<!-- FOOTER -->
<table width="100%" bgcolor="#ffa500">
<tr>
<td align="center">

</td>
</tr>
</table>

</body>
</html>
